<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart | SwiftCart</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #f0f2f5; padding: 40px; color: #1e293b; }

        .cart-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
        }

        .back-link { grid-column: 1 / -1; text-decoration: none; color: #6366f1; font-weight: 600; margin-bottom: 10px; display: block; }
        h1 { font-size: 32px; margin-bottom: 30px; grid-column: 1 / -1; }

        .cart-list {
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            min-height: 200px;
        }

        .cart-item { display: flex; align-items: center; padding: 20px 0; border-bottom: 1px solid #f1f5f9; }
        .cart-item:last-child { border-bottom: none; }

        .item-img { width: 100px; height: 100px; background: #f8fafc; border-radius: 20px; margin-right: 20px; object-fit: cover; }
        .item-info { flex-grow: 1; }
        .item-info h4 { font-size: 18px; margin-bottom: 5px; }
        .item-info p { color: #64748b; font-size: 14px; }

        .qty-controls { display: flex; align-items: center; gap: 15px; background: #f1f5f9; padding: 8px 15px; border-radius: 12px; }
        .qty-btn { border: none; background: transparent; cursor: pointer; font-weight: bold; font-size: 18px; color: #6366f1; }

        /* Summary & Shipping UI */
        .summary-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 35px;
            padding: 40px;
            height: fit-content;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #475569; }
        
        .address-input, .shipping-select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            background: white;
            font-size: 14px;
            outline: none;
        }

        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .summary-total {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed #cbd5e1;
            font-size: 22px;
            font-weight: 800;
            color: #4f46e5;
        }

        .checkout-btn {
            width: 100%;
            background: #6366f1;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .checkout-btn:hover { background: #4f46e5; transform: translateY(-3px); }

        .empty-msg { text-align: center; color: #64748b; padding: 40px 0; }

        @media (max-width: 900px) { .cart-wrapper { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="cart-wrapper">
        <a href="home.html" class="back-link">← Continue Shopping</a>
        <h1>My Shopping Bag</h1>

        <div class="cart-list" id="cart-items-container"></div>

        <div class="summary-card">
            <h2 style="margin-bottom: 20px;">Order Summary</h2>
            
            <div class="input-group">
                <label>Shipping Address</label>
                <input type="text" id="user-address" class="address-input" placeholder="Enter your full address">
            </div>

            <div class="input-group">
                <label>Delivery Option</label>
                <select id="shipping-method" class="shipping-select" onchange="renderCart()">
                    <option value="0">Standard Saver (Free)</option>
                    <option value="50">On-Time Regular (₱50.00)</option>
                    <option value="150">Priority Express (₱150.00)</option>
                </select>
            </div>

            <div class="summary-row">
                <span>Subtotal</span>
                <span id="subtotal-amount">₱0.00</span>
            </div>
            <div class="summary-row">
                <span>Shipping Fee</span>
                <span id="shipping-fee-display">₱0.00</span>
            </div>
            <div class="summary-row summary-total">
                <span>Total</span>
                <span id="total-amount">₱0.00</span>
            </div>
            <button class="checkout-btn" onclick="processCheckout()">Checkout Now</button>
        </div>
    </div>

    <script>
        const cartContainer = document.getElementById('cart-items-container');
        const subtotalLabel = document.getElementById('subtotal-amount');
        const shippingLabel = document.getElementById('shipping-fee-display');
        const totalLabel = document.getElementById('total-amount');
        const shippingSelect = document.getElementById('shipping-method');
        const addressInput = document.getElementById('user-address');

        let cart = JSON.parse(localStorage.getItem('swiftCart')) || [];

        function renderCart() {
            cartContainer.innerHTML = ''; 
            let subtotal = 0;

            if (cart.length === 0) {
                cartContainer.innerHTML = '<div class="empty-msg"><h3>Your bag is empty!</h3></div>';
                subtotalLabel.textContent = "₱0.00";
                shippingLabel.textContent = "₱0.00";
                totalLabel.textContent = "₱0.00";
                return;
            }

            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                subtotal += itemTotal;
                cartContainer.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.image}" class="item-img">
                        <div class="item-info">
                            <h4>${item.name}</h4>
                            <p>Unit Price: ₱${item.price.toLocaleString()}</p>
                        </div>
                        <div style="margin-right: 30px; font-weight: 700;">₱${itemTotal.toLocaleString()}</div>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="updateQty(${index}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                        </div>
                    </div>
                `;
            });

            // Calculate Shipping
            let shippingFee = parseFloat(shippingSelect.value);
            let finalTotal = subtotal + shippingFee;

            subtotalLabel.textContent = `₱${subtotal.toLocaleString()}`;
            shippingLabel.textContent = shippingFee === 0 ? "FREE" : `₱${shippingFee.toLocaleString()}.00`;
            totalLabel.textContent = `₱${finalTotal.toLocaleString()}`;
        }

        window.updateQty = function(index, change) {
            cart[index].quantity += change;
            if (cart[index].quantity <= 0) cart.splice(index, 1);
            localStorage.setItem('swiftCart', JSON.stringify(cart));
            renderCart();
        };

        window.processCheckout = function() {
            if (cart.length === 0) {
                alert("Please add items to your cart!");
                return;
            }
            if (addressInput.value.trim() === "") {
                alert("Please enter your delivery address!");
                addressInput.focus();
                return;
            }

            const methodText = shippingSelect.options[shippingSelect.selectedIndex].text;
            alert(`Order Confirmed!\n\nDelivery to: ${addressInput.value}\nShipping: ${methodText}\n\nThank you for shopping!`);
            
            localStorage.removeItem('swiftCart');
            window.location.href = 'index.html';
        };

        renderCart();
    </script>
</body>
</html>
